<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login · Dream World Dealer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
<style>
  body.login-body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--charcoal);
  }
  .login-topbar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(14px, 3vw, 20px) clamp(16px, 4vw, 28px);
  }
  .login-topbar::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
    background: repeating-linear-gradient(
      90deg,
      var(--green) 0px, var(--green) 3px,
      transparent 3px, transparent 6px,
      var(--amber) 6px, var(--amber) 7px,
      transparent 7px, transparent 12px,
      var(--green) 12px, var(--green) 16px,
      transparent 16px, transparent 19px
    );
    background-size: 220px 100%;
    animation: barcode-scroll 14s linear infinite;
    opacity: 0.9;
  }
  @media (prefers-reduced-motion: reduce) {
    .login-topbar::after { animation: none; }
  }
  .login-topbar .brand-mini {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #cfd8d3;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(15px, 3vw, 18px);
  }
  .login-topbar .brand-mini .dot {
    color: var(--green-bright);
    text-shadow: 0 0 10px rgba(31, 224, 127, 0.55);
  }
  .top-admin-btn {
    background: transparent;
    border: 1px solid #33403a;
    color: #fff;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .top-admin-btn:hover { background: #1d2527; }
  .top-admin-btn.active {
    background: var(--green);
    border-color: var(--green);
  }
  .login-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: var(--radius);
    padding: clamp(24px, 6vw, 32px) clamp(20px, 5vw, 28px);
    box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.35);
  }
  .login-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .login-brand span.dot { color: var(--green); font-size: clamp(18px, 4vw, 22px); }
  .login-brand span.name {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(19px, 4.5vw, 23px);
    letter-spacing: -0.01em;
  }
  .login-card p.tagline {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 22px;
  }
  .login-card .field { margin-bottom: 16px; }
  .login-card button[type="submit"] { width: 100%; justify-content: center; margin-top: 6px; }
  .login-error {
    background: #fbe7e6;
    color: #b3261e;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.visible { display: block; }
  .powered-by {
    flex-shrink: 0;
    position: relative;
    text-align: center;
    color: #8fa39a;
    font-size: 12px;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
    letter-spacing: 0.02em;
  }
  .powered-by::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: repeating-linear-gradient(
      90deg,
      var(--green) 0px, var(--green) 3px,
      transparent 3px, transparent 6px,
      var(--amber) 6px, var(--amber) 7px,
      transparent 7px, transparent 12px,
      var(--green) 12px, var(--green) 16px,
      transparent 16px, transparent 19px
    );
  }
  .powered-by strong { color: #fff; font-weight: 600; }
</style>
</head>
<body class="login-body">

<div class="login-topbar">
  <div class="brand-mini"><span class="dot">●</span> Dream World Dealer</div>
  <button id="topAdminBtn" class="top-admin-btn" type="button">Admin Login</button>
</div>

<div class="login-center">
  <div class="login-card">
    <div class="login-brand"><span class="dot">●</span><span class="name" id="cardTitle">Staff Sign In</span></div>
    <p class="tagline" id="cardTagline">Sign in with your ID to start scanning SIM lines</p>

    <p id="loginError" class="login-error"></p>

    <!-- Staff login: ID number + full name -->
    <form id="staffForm" autocomplete="off">
      <label class="field">
        <span>ID number</span>
        <input id="idNumber" type="text" inputmode="numeric" placeholder="National ID / passport number" required />
      </label>
      <label class="field">
        <span>Full name</span>
        <input id="fullName" type="text" placeholder="As on your ID" required />
      </label>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <!-- Admin login: email + password -->
    <form id="adminForm" autocomplete="off" hidden>
      <label class="field">
        <span>Email</span>
        <input id="adminEmail" type="email" placeholder="admin@example.com" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input id="adminPassword" type="password" placeholder="••••••••" required />
      </label>
      <button type="submit" class="btn btn-primary">Sign in as admin</button>
    </form>
  </div>
</div>

<p class="powered-by">Powered by <strong>Obed Tech</strong></p>

<script src="/js/login.js"></script>
</body>
</html>
