<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login · Dream World Dealer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
<style>
  body.login-body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--charcoal);
    padding: 20px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: var(--radius);
    padding: 32px 28px;
  }
  .login-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .login-brand span.dot { color: var(--green); font-size: 18px; }
  .login-brand span.name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 18px;
  }
  .login-card p.tagline {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 20px;
  }
  .login-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .login-tab {
    flex: 1;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--muted);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .login-tab.active {
    background: var(--charcoal);
    color: #fff;
    border-color: var(--charcoal);
  }
  .login-card .field { margin-bottom: 16px; }
  .login-card button[type="submit"] { width: 100%; justify-content: center; margin-top: 6px; }
  .login-error {
    background: #fbe7e6;
    color: #b3261e;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .login-error.visible { display: block; }
  .powered-by {
    text-align: center;
    color: #7b8a83;
    font-size: 12px;
    margin-top: 18px;
    letter-spacing: 0.02em;
  }
  .powered-by strong { color: #cfd8d3; }
</style>
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-brand"><span class="dot">●</span><span class="name">Dream World Dealer</span></div>
  <p class="tagline">Sign in to start scanning SIM lines</p>

  <div class="login-tabs">
    <button id="staffTabBtn" class="login-tab active" type="button">Staff</button>
    <button id="adminTabBtn" class="login-tab" type="button">Admin</button>
  </div>

  <p id="loginError" class="login-error"></p>

  <!-- Staff login: ID number + full name -->
  <form id="staffForm" autocomplete="off">
    <label class="field">
      <span>ID number</span>
      <input id="idNumber" type="text" inputmode="numeric" placeholder="National ID / passport number" required />
    </label>
    <label class="field">
      <span>Full name</span>
      <input id="fullName" type="text" placeholder="As on your ID" required />
    </label>
    <button type="submit" class="btn btn-primary">Sign in</button>
  </form>

  <!-- Admin login: email + password -->
  <form id="adminForm" autocomplete="off" hidden>
    <label class="field">
      <span>Email</span>
      <input id="adminEmail" type="email" placeholder="admin@example.com" required />
    </label>
    <label class="field">
      <span>Password</span>
      <input id="adminPassword" type="password" placeholder="••••••••" required />
    </label>
    <button type="submit" class="btn btn-primary">Sign in as admin</button>
  </form>
</div>

<p class="powered-by">Powered by <strong>Obed Tech</strong></p>

<script src="/js/login.js"></script>
</body>
</html>
